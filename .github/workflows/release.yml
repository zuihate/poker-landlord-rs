name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: poker-landlord-rs
            name: linux

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: poker-landlord-rs.exe
            name: windows

          - os: macos-latest
            target: x86_64-apple-darwin
            bin: poker-landlord-rs
            name: macos

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      # 📦 打包
      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp target/release/${{ matrix.bin }} dist/
          tar -czf poker-landlord-rs-${{ matrix.name }}.tar.gz -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\release\${{ matrix.bin }} dist\
          powershell Compress-Archive -Path dist\* -DestinationPath poker-landlord-rs-windows.zip

      # 🚀 上传 Release
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip