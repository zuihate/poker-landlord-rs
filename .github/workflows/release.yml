name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: poker-landlord-rs
            name: linux

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: poker-landlord-rs.exe
            name: windows

          - os: macos-latest
            target: x86_64-apple-darwin
            bin: poker-landlord-rs
            name: macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/release/${{ matrix.bin }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp target/release/${{ matrix.bin }} dist/
          tar -czf poker-landlord-rs-${{ github.ref_name }}-${{ matrix.name }}.tar.gz -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\release\${{ matrix.bin }} dist\
          powershell Compress-Archive -Path dist\* -DestinationPath poker-landlord-rs-${{ github.ref_name }}-windows.zip

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
          fail_on_unmatched_files: false